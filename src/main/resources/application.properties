spring.application.name=spring-oauth2-resource-server

#db
#server.port=8081 en pause pour tester gateway
spring.datasource.url = ${MYSQL_URL_SPRING_OAUTH2_RESOURCE_SERVER}
spring.datasource.username=${MYSQL_USERNAME}
spring.datasource.password=${MYSQL_PASSWORD}


#jpa
spring.jpa.hibernate.ddl-auto=update
server.servlet.context-path=${SERVLET_CONTEXT_PATH}


#swagger
springdoc.api-docs.path=${API_DOCS_PATH}

#security
spring.security.oauth2.resourceserver.jwt.issuer-uri=${OUATH2_RESOURCESERVER_JWT_ISSUER_URI}